name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: fairlens
  BACKEND_SERVICE: fairlens-api
  FRONTEND_SERVICE: fairlens-frontend

jobs:
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker login to Artifact Registry
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | \
          docker login -u oauth2accesstoken --password-stdin \
          https://${{ env.REGISTRY }}

      - name: Build & push backend image
        id: build
        working-directory: backend
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 80 \
            --max-instances 10 \
            --timeout 3600 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},ENVIRONMENT=production" \
            --quiet

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Backend: $URL"

  deploy-frontend:
    name: Deploy Frontend → Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm install
          VITE_API_BASE_URL="https://fairlens-api-nrk2z2yadq-uc.a.run.app" npm run build

      - name: Docker login to Artifact Registry
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | \
          docker login -u oauth2accesstoken --password-stdin \
          https://${{ env.REGISTRY }}

      - name: Build & push frontend image
        id: build
        working-directory: frontend
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --quiet

      - name: Print live URLs
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Frontend: $URL"
          echo "## 🚀 FairLens Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Docs | ${{ needs.deploy-backend.outputs.url }}/docs |" >> $GITHUB_STEP_SUMMARY
